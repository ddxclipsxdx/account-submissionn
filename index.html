<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Submit Accounts</title>

<style>
body {
  font-family: Arial;
  background:#f2f2f2;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.box {
  background:white;
  padding:30px;
  width:420px;
  border-radius:12px;
  box-shadow:0 4px 12px rgba(0,0,0,.1);
  text-align:center;
}

textarea {
  width:100%;
  height:140px;
  padding:10px;
  border-radius:6px;
  border:1px solid #ccc;
  margin-top:10px;
}

button {
  padding:10px 15px;
  margin:5px;
  border:none;
  background:#007bff;
  color:white;
  border-radius:6px;
  cursor:pointer;
}

button:hover { background:#0056b3; }

.selected {
  background:#28a745 !important;
}

.success {
  margin-top:15px;
  color:green;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="box">
<h2>Submit Accounts 📱</h2>

<p><b>Select Site:</b></p>

<button onclick="selectSite('Arion')" id="Arion">Arion</button>
<button onclick="selectSite('NinoGaming')" id="NinoGaming">NinoGaming</button>
<button onclick="selectSite('BigBunny')" id="BigBunny">BigBunny</button>

<form id="form">

<textarea id="numbers"
placeholder="Enter numbers here..."
required></textarea>

<br>
<button type="submit">Submit</button>
</form>

<div class="success" id="msg"></div>

</div>

<script>
let selectedSite = "";

function selectSite(site) {
  selectedSite = site;

  document.querySelectorAll("button").forEach(b=>{
    b.classList.remove("selected");
  });

  document.getElementById(site).classList.add("selected");
}

document.getElementById("form").addEventListener("submit", async e=>{
e.preventDefault();

if(!selectedSite){
  alert("Select site first!");
  return;
}

let numbers = document.getElementById("numbers").value
.replace(/,/g,"\n")
.replace(/\s+/g,"\n")
.split("\n")
.map(n=>n.trim())
.filter(n=>n);

const valid=/^(09\d{9}|9\d{9})$/;
let cleaned=[];

for(let num of numbers){
  if(!valid.test(num)){
    alert("Invalid number: "+num);
    return;
  }
  if(num.startsWith("9")) num="0"+num;
  cleaned.push(num);
}

cleaned=[...new Set(cleaned)];

const formatted =
`Site: ${selectedSite}\n\n${cleaned.join("\n")}`;

await fetch("/.netlify/functions/send",{
method:"POST",
headers:{ "Content-Type":"application/json"},
body:JSON.stringify({numbers:formatted})
});

document.getElementById("msg").innerHTML =
"✅ Submitted successfully!";

document.getElementById("numbers").value="";
});
</script>

</body>
</html>
