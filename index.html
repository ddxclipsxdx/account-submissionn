<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Account Submission - Bryle</title>

<style>
body{
  font-family:Segoe UI;
  background:#ffffff;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

/* GLASS UI BOX */
.box{
  width:460px;
  padding:30px;
  border-radius:20px;
  background:rgba(255,255,255,0.6);
  backdrop-filter:blur(15px);
  border:1px solid rgba(255,255,255,.4);
  box-shadow:0 10px 30px rgba(0,0,0,.12);
  text-align:center;
}

/* RGB subtle glow */
.box::before{
  content:"";
  position:absolute;
  inset:-2px;
  border-radius:22px;
  background:linear-gradient(
    45deg,red,orange,yellow,green,cyan,blue,violet,red
  );
  background-size:400%;
  z-index:-1;
  animation:rgb 12s linear infinite;
  opacity:.25;
}

@keyframes rgb{
  0%{background-position:0%}
  100%{background-position:400%}
}

button.site{
  padding:10px 16px;
  margin:5px;
  border:none;
  border-radius:10px;
  background:#007bff;
  color:white;
  cursor:pointer;
  font-weight:bold;
}

.selected{
  background:#28a745 !important;
}

input, textarea{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:1px solid #ddd;
  margin-top:12px;
  background:rgba(255,255,255,.8);
}

textarea{height:140px;}

.submit-btn{
  margin-top:15px;
  padding:14px;
  width:100%;
  border:none;
  border-radius:12px;
  color:white;
  font-weight:bold;
  background:linear-gradient(45deg,#007bff,#00d4ff);
  cursor:pointer;
  transition:.3s;
}

.submit-btn:hover{
  transform:scale(1.05);
}

.counter{font-size:13px;margin-top:5px;color:#555;}
.success{margin-top:15px;color:green;font-weight:bold;}
.footer{margin-top:20px;font-size:13px;color:#666;}
</style>
</head>

<body>

<div class="box">

<h2>Account Submission - Bryle</h2>

<p><b>Select Site:</b></p>

<button class="site" onclick="selectSite('Arion')" id="Arion">Arion</button>
<button class="site" onclick="selectSite('NinoGaming')" id="NinoGaming">NinoGaming</button>
<button class="site" onclick="selectSite('BigBunny')" id="BigBunny">BigBunny</button>

<form id="form">

<input type="text" id="fbname" placeholder="Facebook Name:" required>

<textarea id="numbers" placeholder="Enter numbers here..." required></textarea>

<div class="counter" id="count">0 numbers entered</div>

<button class="submit-btn">Submit Accounts</button>
</form>

<div class="success" id="msg"></div>

<div class="footer">
Developer: ~ Bryle
</div>

</div>

<script>
let selectedSite="";
let lastSubmitTime=0;

function selectSite(site){
  selectedSite=site;
  document.querySelectorAll(".site").forEach(b=>b.classList.remove("selected"));
  document.getElementById(site).classList.add("selected");
}

/* LIVE COUNT */
numbers.oninput=()=>{
let count=numbers.value
.replace(/,/g,"\n")
.replace(/\s+/g,"\n")
.split("\n")
.filter(n=>n.trim()).length;
countEl.innerText=count+" numbers entered";
};

form.onsubmit=async e=>{
e.preventDefault();

if(Date.now()-lastSubmitTime<10000){
alert("Wait 10 seconds before submitting again.");
return;
}

let fb=fbname.value.trim();
if(!fb){alert("Facebook name required.");return;}
if(!selectedSite){alert("Select site first.");return;}

let nums=numbers.value
.replace(/,/g,"\n")
.replace(/\s+/g,"\n")
.split("\n")
.map(n=>n.trim())
.filter(n=>n);

let valid=/^(09\d{9}|9\d{9})$/;
let cleaned=[];

for(let n of nums){
if(!valid.test(n)){alert("Invalid number: "+n);return;}
if(n.startsWith("9")) n="0"+n;
cleaned.push(n);
}

cleaned=[...new Set(cleaned)];

await fetch("/.netlify/functions/send",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
numbers:`Site: ${selectedSite}\nFacebook: ${fb}\n\n${cleaned.join("\n")}`,
filename:fb
})
});

msg.innerHTML="✅ Submitted successfully!";
numbers.value="";
fbname.value="";
count.innerHTML="0 numbers entered";
lastSubmitTime=Date.now();
};
</script>

</body>
</html>
