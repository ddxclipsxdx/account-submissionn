<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Account Submission Notice</title>

<style>
body {
  margin: 0;
  background: #0e1116;
  font-family: "Segoe UI", Arial, sans-serif;
  color: #e4e6eb;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  text-align: center;
  max-width: 520px;
  padding: 40px 30px;
}

h1 {
  font-weight: 500;
  margin-bottom: 15px;
  letter-spacing: .5px;
}

p {
  color: #aeb4be;
  line-height: 1.6;
  margin: 12px 0;
}

#countdown {
  margin-top: 20px;
  font-size: 28px;
  font-weight: 500;
  color: #8aa4ff;
  letter-spacing: 1px;
}

.signature {
  margin-top: 30px;
  color: #7c8cff;
  letter-spacing: 1px;
}
</style>
</head>

<body>
<div class="container">

<h1>Account Submission Notice</h1>

<p>
Submission of accounts is temporarily closed.
</p>

<p>
It will reopen later at 
<strong>8:00 PM onwards</strong>.
</p>

<div id="countdown">Loading countdown…</div>

<p>
Please check back at the scheduled time.  
Thank you for your patience and understanding.
</p>

<div class="signature">~ BRYLE</div>

</div>

<script>
function updateCountdown() {
  const now = new Date();

  const target = new Date();
  target.setHours(20, 0, 0, 0);

  if (now > target) {
    target.setDate(target.getDate() + 1);
  }

  const diff = target - now;

  const h = Math.floor(diff / 1000 / 60 / 60);
  const m = Math.floor(diff / 1000 / 60 % 60);
  const s = Math.floor(diff / 1000 % 60);

  document.getElementById("countdown").textContent =
    `${h}h ${m}m ${s}s remaining`;
}

setInterval(updateCountdown, 1000);
updateCountdown();
</script>

</body>
</html>
