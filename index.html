<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Account Submission - Bryle</title>

<style>
body{
  font-family:Segoe UI;
  background:#ffffff;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
}

/* GLASS BOX */
.box{
  width:460px;
  padding:30px;
  border-radius:20px;
  background:rgba(255,255,255,.65);
  backdrop-filter:blur(18px);
  border:1px solid rgba(255,255,255,.5);
  box-shadow:0 10px 30px rgba(0,0,0,.12);
  text-align:center;
  position:relative;
}

/* RGB subtle glow */
.box::before{
  content:"";
  position:absolute;
  inset:-2px;
  border-radius:22px;
  background:linear-gradient(
    45deg,red,orange,yellow,green,cyan,blue,violet,red
  );
  background-size:400%;
  animation:rgb 12s linear infinite;
  opacity:.25;
  z-index:-1;
}

@keyframes rgb{
  0%{background-position:0%}
  100%{background-position:400%}
}

/* SITE BUTTONS */
button.site{
  padding:10px 18px;
  margin:6px;
  border:none;
  border-radius:10px;
  background:#007bff;
  color:white;
  cursor:pointer;
  font-weight:bold;
  transition:.2s;
}

button.site:hover{
  transform:scale(1.05);
}

.selected{
  background:#28a745 !important;
}

/* FACEBOOK NAME INPUT */
#fbname{
  width:65%;
  margin:15px auto;
  display:block;
  padding:12px;
  border-radius:12px;
  border:1px solid #ccc;
  text-align:center;
  font-size:15px;
  transition:.3s;
}

/* TEXTAREA */
textarea{
  width:100%;
  height:140px;
  padding:12px;
  border-radius:12px;
  border:1px solid #ddd;
  margin-top:12px;
  resize:none;
  transition:.3s;
}

/* FOCUS GLOW */
input:focus, textarea:focus{
  outline:none;
  border-color:#00bfff;
  box-shadow:0 0 12px rgba(0,191,255,.7);
}

/* SUBMIT BUTTON */
.submit-btn{
  margin-top:18px;
  padding:14px;
  width:100%;
  border:none;
  border-radius:12px;
  color:white;
  font-weight:bold;
  background:linear-gradient(45deg,#007bff,#00d4ff);
  cursor:pointer;
  transition:.3s;
}

.submit-btn:hover{
  transform:scale(1.05);
}

/* COUNTER */
.counter{
  font-size:13px;
  margin-top:6px;
  color:#555;
}

/* SUCCESS */
.success{
  margin-top:15px;
  color:green;
  font-weight:bold;
}

/* FOOTER */
.footer{
  margin-top:20px;
  font-size:13px;
  color:#666;
}

/* MOBILE */
@media(max-width:520px){
  .box{
    width:92%;
    padding:20px;
  }

  #fbname{
    width:85%;
  }

  textarea{
    height:120px;
  }
}
</style>
</head>

<body>

<div class="box">

<h2>Account Submission - Bryle</h2>

<p><b>Select Site:</b></p>

<button class="site" onclick="selectSite('Arion')" id="Arion">Arion</button>
<button class="site" onclick="selectSite('NinoGaming')" id="NinoGaming">NinoGaming</button>
<button class="site" onclick="selectSite('BigBunny')" id="BigBunny">BigBunny</button>

<form id="form">

<input type="text" id="fbname" placeholder="Facebook Name:" required>

<textarea id="numbers" placeholder="Enter numbers here..." required></textarea>

<div class="counter" id="count">0 numbers entered</div>

<button class="submit-btn">Submit Accounts</button>

</form>

<div class="success" id="msg"></div>

<div class="footer">
Developer: ~ Bryle
</div>

</div>

<script>
let selectedSite="";
let lastSubmitTime=0;

const numbersField=document.getElementById("numbers");
const countDisplay=document.getElementById("count");
const form=document.getElementById("form");
const fbname=document.getElementById("fbname");
const msg=document.getElementById("msg");

/* SITE SELECT */
function selectSite(site){
  selectedSite=site;
  document.querySelectorAll(".site").forEach(b=>b.classList.remove("selected"));
  document.getElementById(site).classList.add("selected");
}

/* LIVE COUNTER (FIXED) */
numbersField.addEventListener("input",function(){

  let count=numbersField.value
    .replace(/,/g,"\n")
    .replace(/\s+/g,"\n")
    .split("\n")
    .filter(n=>n.trim()).length;

  countDisplay.innerText=count+" numbers entered";
});

/* SUBMIT */
form.addEventListener("submit",async function(e){
e.preventDefault();

/* Anti-spam 10 seconds */
if(Date.now()-lastSubmitTime<10000){
alert("Wait 10 seconds before submitting again.");
return;
}

let fb=fbname.value.trim();
if(!fb){alert("Facebook name required.");return;}
if(!selectedSite){alert("Select site first.");return;}

let nums=numbersField.value
.replace(/,/g,"\n")
.replace(/\s+/g,"\n")
.split("\n")
.map(n=>n.trim())
.filter(n=>n);

let valid=/^(09\d{9}|9\d{9})$/;
let cleaned=[];

for(let n of nums){
if(!valid.test(n)){alert("Invalid number: "+n);return;}
if(n.startsWith("9")) n="0"+n;
cleaned.push(n);
}

cleaned=[...new Set(cleaned)];

await fetch("/.netlify/functions/send",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
numbers:`Site: ${selectedSite}\nFacebook: ${fb}\n\n${cleaned.join("\n")}`,
filename:fb
})
});

msg.innerHTML="✅ Submitted successfully!";
numbersField.value="";
fbname.value="";
countDisplay.innerText="0 numbers entered";
lastSubmitTime=Date.now();
});
</script>

</body>
</html>
