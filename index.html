<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Account Submission - Bryle</title>

<style>
/* BODY */
body{
  font-family:Segoe UI;
  background:#ffffff;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

/* COLORED REALISTIC BOX */
.box{
  width:440px;
  padding:30px;
  border-radius:18px;
  background:linear-gradient(145deg,#f0f4ff,#e4ebff);
  text-align:center;
  box-shadow:
    0 10px 25px rgba(0,0,0,.08),
    inset 0 0 10px rgba(255,255,255,.7);
  position:relative;
}

/* RGB OUTLINE */
.box::before{
  content:"";
  position:absolute;
  inset:-2px;
  border-radius:20px;
  background:linear-gradient(
    45deg,
    red,orange,yellow,green,cyan,blue,violet,red
  );
  background-size:400%;
  z-index:-1;
  animation:rgb 10s linear infinite;
}

@keyframes rgb{
  0%{background-position:0%}
  100%{background-position:400%}
}

/* TITLE */
h2{
  margin-bottom:20px;
}

/* SITE BUTTONS */
button.site{
  padding:10px 16px;
  margin:5px;
  border:none;
  border-radius:8px;
  background:#007bff;
  color:white;
  cursor:pointer;
  font-weight:bold;
}

button.site:hover{
  background:#0056b3;
}

.selected{
  background:#28a745 !important;
}

/* TEXTAREA */
textarea{
  width:100%;
  height:140px;
  padding:12px;
  border-radius:10px;
  border:1px solid #ccc;
  margin-top:10px;
  resize:none;
  font-size:14px;
}

/* LIVE COUNTER */
.counter{
  font-size:13px;
  color:#555;
  margin-top:6px;
}

/* ANIMATED SUBMIT BUTTON */
.submit-btn{
  margin-top:15px;
  padding:12px;
  width:100%;
  border:none;
  border-radius:10px;
  color:white;
  font-weight:bold;
  background:linear-gradient(45deg,#007bff,#00d4ff);
  background-size:200%;
  cursor:pointer;
  transition:.3s;
}

.submit-btn:hover{
  animation:btnrgb 2s infinite linear;
  transform:scale(1.05);
}

@keyframes btnrgb{
  0%{background-position:0%}
  100%{background-position:200%}
}

/* SUCCESS TEXT */
.success{
  margin-top:15px;
  color:green;
  font-weight:bold;
}

/* FOOTER */
.footer{
  margin-top:20px;
  font-size:13px;
  color:#666;
}
</style>
</head>

<body>

<div class="box">

<h2>Account Submission - Bryle</h2>

<p><b>Select Site:</b></p>

<button class="site" onclick="selectSite('Arion')" id="Arion">Arion</button>
<button class="site" onclick="selectSite('NinoGaming')" id="NinoGaming">NinoGaming</button>
<button class="site" onclick="selectSite('BigBunny')" id="BigBunny">BigBunny</button>

<form id="form">

<textarea id="numbers"
placeholder="Enter numbers here..."
required></textarea>

<div class="counter" id="count">0 numbers entered</div>

<button class="submit-btn" type="submit">
Submit Accounts 🚀
</button>

</form>

<div class="success" id="msg"></div>

<div class="footer">
Developer: ~ Bryle
</div>

</div>

<script>
let selectedSite="";
let lastSubmitTime=0;

function selectSite(site){
  selectedSite=site;
  document.querySelectorAll(".site").forEach(b=>b.classList.remove("selected"));
  document.getElementById(site).classList.add("selected");
}

/* LIVE NUMBER COUNTER */
document.getElementById("numbers").addEventListener("input",()=>{
let count=document.getElementById("numbers").value
.replace(/,/g,"\n")
.replace(/\s+/g,"\n")
.split("\n")
.filter(n=>n.trim()).length;

document.getElementById("count").innerHTML=
count+" numbers entered";
});

/* SUBMIT FUNCTION */
document.getElementById("form").addEventListener("submit",async e=>{
e.preventDefault();

/* ANTI SPAM (10 sec cooldown) */
if(Date.now()-lastSubmitTime<10000){
alert("Please wait 10 seconds before submitting again.");
return;
}

if(!selectedSite){
alert("Select site first!");
return;
}

let numbers=document.getElementById("numbers").value
.replace(/,/g,"\n")
.replace(/\s+/g,"\n")
.split("\n")
.map(n=>n.trim())
.filter(n=>n);

const valid=/^(09\d{9}|9\d{9})$/;
let cleaned=[];

for(let num of numbers){
if(!valid.test(num)){
alert("Invalid number: "+num);
return;
}
if(num.startsWith("9")) num="0"+num;
cleaned.push(num);
}

cleaned=[...new Set(cleaned)];

const formatted=
`Site: ${selectedSite}\n\n${cleaned.join("\n")}`;

await fetch("/.netlify/functions/send",{
method:"POST",
headers:{ "Content-Type":"application/json"},
body:JSON.stringify({numbers:formatted})
});

lastSubmitTime=Date.now();

document.getElementById("msg").innerHTML=
"✅ Submitted successfully!";

document.getElementById("numbers").value="";
document.getElementById("count").innerHTML="0 numbers entered";
});
</script>

</body>
</html>
