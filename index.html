<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Account Submission Notice</title>

<style>
body {
  margin: 0;
  background: #0e1116;
  font-family: "Segoe UI", Arial, sans-serif;
  color: #e4e6eb;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  text-align: center;
  max-width: 520px;
  padding: 45px 35px;
  opacity: 0;
  transform: translateY(20px);
  animation: fadeIn 1.2s ease forwards;
}

@keyframes fadeIn {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.badge {
  display: inline-block;
  padding: 6px 14px;
  border-radius: 20px;
  background: #202632;
  color: #8aa4ff;
  font-size: 13px;
  letter-spacing: .5px;
  margin-bottom: 15px;
}

h1 {
  font-weight: 500;
  margin-bottom: 18px;
  letter-spacing: .6px;
}

p {
  color: #aeb4be;
  line-height: 1.7;
  margin: 14px 0;
  font-size: 15px;
}

.highlight {
  color: #8aa4ff;
  font-weight: 500;
}

.signature {
  margin-top: 32px;
  color: #7c8cff;
  letter-spacing: 1px;
  font-size: 14px;
}
</style>
</head>

<body>
<div class="container">

<div class="badge">NOTICE</div>

<h1>Account Submission Temporarily Closed</h1>

<p>
Submission of accounts is currently unavailable.
</p>

<p>
This service will remain closed 
<span class="highlight">until further notice</span>.
</p>

<p>
We appreciate your patience while this is being managed.  
Please check back periodically for updates.
</p>

<div class="signature">~ BRYLE</div>

</div>
</body>
</html>
