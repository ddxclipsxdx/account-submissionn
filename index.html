<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Account Submission - Bryle</title>

<style>
/* BODY */
body{
  font-family:Segoe UI, Arial;
  background:#ffffff;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

/* RGB GLOW BOX */
.box{
  width:430px;
  padding:30px;
  border-radius:15px;
  background:#ffffff;
  text-align:center;
  position:relative;
  box-shadow:0 0 20px rgba(0,0,0,0.08);
}

/* RGB border glow */
.box::before{
  content:"";
  position:absolute;
  inset:-3px;
  border-radius:18px;
  background:linear-gradient(
    45deg,
    red,orange,yellow,green,cyan,blue,violet,red
  );
  background-size:400%;
  z-index:-1;
  animation:rgb 8s linear infinite;
}

@keyframes rgb{
  0%{background-position:0%}
  100%{background-position:400%}
}

/* TITLE */
h2{
  margin-bottom:20px;
}

/* BUTTONS */
button{
  padding:10px 16px;
  margin:5px;
  border:none;
  border-radius:7px;
  background:#007bff;
  color:white;
  cursor:pointer;
  font-weight:bold;
}

button:hover{
  background:#0056b3;
}

/* SELECTED SITE */
.selected{
  background:#28a745 !important;
}

/* TEXTAREA */
textarea{
  width:100%;
  height:140px;
  padding:10px;
  border-radius:8px;
  border:1px solid #ccc;
  margin-top:10px;
  resize:none;
  font-size:14px;
}

/* SUCCESS MESSAGE */
.success{
  margin-top:15px;
  color:green;
  font-weight:bold;
}

/* FOOTER */
.footer{
  margin-top:20px;
  font-size:13px;
  color:#777;
}
</style>
</head>

<body>

<div class="box">

<h2>Account Submission - Bryle</h2>

<p><b>Select Site:</b></p>

<button onclick="selectSite('Arion')" id="Arion">Arion</button>
<button onclick="selectSite('NinoGaming')" id="NinoGaming">NinoGaming</button>
<button onclick="selectSite('BigBunny')" id="BigBunny">BigBunny</button>

<form id="form">

<textarea id="numbers"
placeholder="Enter numbers here..."
required></textarea>

<br>
<button type="submit">Submit</button>
</form>

<div class="success" id="msg"></div>

<div class="footer">
Developer: ~ Bryle
</div>

</div>

<script>
let selectedSite="";

function selectSite(site){
  selectedSite=site;

  document.querySelectorAll("button").forEach(b=>{
    if(b.id) b.classList.remove("selected");
  });

  document.getElementById(site).classList.add("selected");
}

document.getElementById("form").addEventListener("submit",async e=>{
e.preventDefault();

if(!selectedSite){
  alert("Select site first!");
  return;
}

let numbers=document.getElementById("numbers").value
.replace(/,/g,"\n")
.replace(/\s+/g,"\n")
.split("\n")
.map(n=>n.trim())
.filter(n=>n);

const valid=/^(09\d{9}|9\d{9})$/;
let cleaned=[];

for(let num of numbers){
  if(!valid.test(num)){
    alert("Invalid number: "+num);
    return;
  }
  if(num.startsWith("9")) num="0"+num;
  cleaned.push(num);
}

cleaned=[...new Set(cleaned)];

const formatted=
`Site: ${selectedSite}\n\n${cleaned.join("\n")}`;

await fetch("/.netlify/functions/send",{
method:"POST",
headers:{ "Content-Type":"application/json"},
body:JSON.stringify({numbers:formatted})
});

document.getElementById("msg").innerHTML=
"✅ Submitted successfully!";

document.getElementById("numbers").value="";
});
</script>

</body>
</html>
